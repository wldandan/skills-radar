<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="none" stroke="#4ECDC4" stroke-width="3"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#4ECDC4" stroke-width="2" opacity="0.7"/>
  <circle cx="50" cy="50" r="15" fill="none" stroke="#4ECDC4" stroke-width="1.5" opacity="0.4"/>
  <circle cx="50" cy="50" r="5" fill="#4ECDC4"/>
  <!-- Radar sweep line -->
  <line x1="50" y1="50" x2="95" y2="50" stroke="#4ECDC4" stroke-width="2" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="3s" repeatCount="indefinite"/>
  </line>
  <!-- Target dots -->
  <circle cx="75" cy="35" r="4" fill="#FF6B6B"/>
  <circle cx="70" cy="60" r="3" fill="#45B7D1"/>
  <circle cx="35" cy="55" r="3.5" fill="#DDA0DD"/>
  <circle cx="40" cy="30" r="3" fill="#96CEB4"/>
</svg>
